project:
  type: book
  output-dir: _book
  resources:
    - tools/**

book:
  title: "Partner, Don't Police: AI in the Business Classroom"
  author: "Michael Borck"
  date: today
  license: "CC BY"
  description: "A practical guide for business educators on integrating AI as a teaching partner across disciplines, with ready-to-use prompts, assessment frameworks, and discipline-specific examples."
  cover-image: cover.png
  favicon: favicon.svg
  chapters:
    - copyright.qmd
    - index.qmd
    - acknowledgments.qmd
    - introduction.qmd
    - what-is-ai.qmd
    - what-are-llms.qmd
    - getting-started.qmd
    - discovering-your-strategy.qmd
    - first-steps.qmd
    - seven-techniques.qmd
    - managing-context.qmd
    - flight-simulator.qmd
    - critique-toolkit.qmd
    - ethics-integrity.qmd
    - process-assessment.qmd
    - group-assessment.qmd
    - self-assessment.qmd
    - virtual-company.qmd
    - unit-design.qmd
    - static-to-interactive.qmd
    - from-conversation-to-document.qmd
    - research-assistant.qmd
    - advanced-frontiers.qmd
    - assessment-design.qmd
    - technical-troubleshooting.qmd
    - accessibility-inclusion.qmd
    - global-perspectives.qmd
    - conclusion.qmd
  appendices:
    - prompt-library.qmd
    - workshop-guide.qmd
    - curtin-alignment.qmd
    - advanced-prompting.qmd
    - craft-vs-create.qmd
    - rubric-system.qmd
    - stress-test-sequence.qmd
    - glossary.qmd
    - further-reading.qmd
    - about-author.qmd
  other-links:
    - text: Download PDF
      icon: file-pdf
      href: partner-dont-police.pdf
    - text: Download EPUB
      icon: book
      href: partner-dont-police.epub
    - text: Download llm.txt
      icon: robot
      href: llm.txt
    - text: GitHub
      icon: github
      href: https://github.com/michael-borck/partner-dont-police
    - text: DeepWiki
      icon: search
      href: https://deepwiki.com/michael-borck/partner-dont-police
    - text: All Books
      icon: collection
      href: https://books.borck.education

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    include-after-body: chatbot.html
    toc: true
    toc-depth: 3
    number-sections: true
    code-tools: true
