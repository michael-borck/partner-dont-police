project:
  type: book
  output-dir: _book
  resources:
    - tools/**

book:
  title: "Partner, Don't Police: AI in the Business Classroom"
  author: "Michael Borck"
  date: today
  license: "CC BY"
  description: "A practical guide for business educators on integrating AI as a teaching partner across disciplines, with ready-to-use prompts, assessment frameworks, and discipline-specific examples."
  cover-image: cover.png
  favicon: favicon.svg
  chapters:
    - copyright.qmd
    - index.qmd
    - acknowledgments.qmd
    - chapters/introduction.qmd
    - chapters/understanding-ai.qmd
    - chapters/getting-started.qmd
    - chapters/seven-techniques.qmd
    - chapters/managing-context.qmd
    - chapters/flight-simulator.qmd
    - chapters/critique-toolkit.qmd
    - chapters/ethics-integrity.qmd
    - chapters/assessment.qmd
    - chapters/self-assessment.qmd
    - chapters/virtual-company.qmd
    - chapters/unit-design.qmd
    - chapters/transforming-content.qmd
    - chapters/global-perspectives.qmd
    - chapters/implementation-practicalities.qmd
    - chapters/conclusion.qmd
  appendices:
    - appendices/institutional-alignment.qmd
    - appendices/rubric-system.qmd
    - appendices/stress-test-sequence.qmd
    - appendices/glossary.qmd
    - appendices/further-reading.qmd
    - about-author.qmd
  other-links:
    - text: Download PDF
      icon: file-pdf
      href: partner-dont-police.pdf
    - text: Download EPUB
      icon: book
      href: partner-dont-police.epub
    - text: Download llm.txt
      icon: robot
      href: llm.txt
    - text: GitHub
      icon: github
      href: https://github.com/michael-borck/partner-dont-police
    - text: DeepWiki
      icon: search
      href: https://deepwiki.com/michael-borck/partner-dont-police
    - text: All Books
      icon: collection
      href: https://books.borck.education

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    include-after-body: chatbot.html
    toc: true
    toc-depth: 3
    number-sections: true
    code-tools: true
